kind = "web"
previewPath = "/"
title = "LISTA — Lorenz International Skills Training Academy"
version = "1.0.0"
id = "artifacts/lista"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19161

[services.development]
run = "pnpm --filter @workspace/lista run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lista", "run", "build" ]
publicDir = "artifacts/lista/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19161"
BASE_PATH = "/"
